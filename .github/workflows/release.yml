name: Release Android APK

on:
  push:
    tags:
      - 'v*'           # 推送 v1.0.0 这类标签时触发
  workflow_dispatch:   # 允许手动触发

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 .NET 版本
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 安装 Uno Platform 工作负载
        run: |
          dotnet workload install uno-platform

      - name: 还原依赖
        run: dotnet restore

      - name: 构建 Android APK
        run: |
          dotnet publish EroMangaManagerHttpApiClient/EroMangaManagerHttpApiClient.csproj `
            -f net10.0-android `
            -c Release `
            -p:AndroidPackageFormats=apk `
            -o ./publish

      - name: 查找 APK 文件
        id: find_apk
        shell: pwsh
        run: |
          $apkPath = Get-ChildItem -Path ./publish -Filter "*.apk" -Recurse | Select-Object -First 1
          if (-not $apkPath) {
            Write-Error "未找到 APK 文件"
            exit 1
          }
          Write-Output "APK 路径: $($apkPath.FullName)"
          echo "apk_path=$($apkPath.FullName)" >> $env:GITHUB_OUTPUT

      - name: 创建 GitHub Release 并上传 APK
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 🎉 新版本发布
            
            自动构建于 ${{ github.ref_name }}
            
            ### 下载安装
            下载下方的 `*.apk` 文件，在安卓设备上直接安装。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
