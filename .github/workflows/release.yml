name: Release Android APK

on:
  push:
    tags:
      - 'v*'           # 推送 v1.0.0 这类标签时触发
  workflow_dispatch:   # 允许手动触发

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 .NET 版本
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 安装 android workload
        run: |
          dotnet workload install android ios

      - name: 克隆桌面端仓库（获取 Core 项目）
        shell: pwsh
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/DJDQfff/EroMangaManager.git ../EroMangaManager_temp
          
          # 确保目标目录存在
          New-Item -ItemType Directory -Force -Path "./EroMangaManager/EroMangaManager.Core"
          
          # 直接复制 Core 项目文件到 CI 期望的路径
          Copy-Item -Path "../EroMangaManager_temp/EroMangaManager.Core/*" -Destination "./EroMangaManager/EroMangaManager.Core/" -Recurse -Force
          
          # 验证文件是否就位
          Write-Output "Checking for Core project file at expected path:"
          if (Test-Path "./EroMangaManager/EroMangaManager.Core/EroMangaManager.Core.csproj") {
              Write-Output "✅ Core project file is in place."
          } else {
              Write-Error "❌ Core project file still not found at expected path."
              Get-ChildItem -Path "./EroMangaManager" -Recurse -Depth 3
              exit 1
          }
      - name: 修正 .slnx 路径
        shell: pwsh
        run: |
          $slnxPath = "EroMangaManagerHttpApiClient.slnx"
          # 直接写入只包含安卓项目和 Core 项目的 .slnx
          @"
          <Solution>
            <Project Path="EroMangaManager/EroMangaManager.Core/EroMangaManager.Core.csproj" />
            <Project Path="EroMangaManagerHttpApiClient/EroMangaManagerHttpApiClient.csproj">
              <Deploy />
            </Project>
          </Solution>
          "@ | Set-Content $slnxPath
          Write-Output "修正后的 slnx:"
          Get-Content $slnxPath
          
      - name: 还原依赖
        run: dotnet restore EroMangaManagerHttpApiClient.slnx
      
      - name: 构建 Android APK
        run: |
          dotnet publish EroMangaManagerHttpApiClient/EroMangaManagerHttpApiClient.csproj `
            -f net10.0-android `
            -c Release `
            -p:AndroidPackageFormats=apk `
            -o ./publish

      - name: 查找 APK 文件
        id: find_apk
        shell: pwsh
        run: |
          $apkPath = Get-ChildItem -Path ./publish -Filter "*.apk" -Recurse | Select-Object -First 1
          if (-not $apkPath) {
            Write-Error "未找到 APK 文件"
            exit 1
          }
          Write-Output "APK 路径: $($apkPath.FullName)"
          echo "apk_path=$($apkPath.FullName)" >> $env:GITHUB_OUTPUT

      - name: 创建 GitHub Release 并上传 APK
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 🎉 新版本发布
            
            自动构建于 ${{ github.ref_name }}
            
            ### 下载安装
            下载下方的 `*.apk` 文件，在安卓设备上直接安装。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

